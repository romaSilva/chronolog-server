version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: chronolog-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chronolog_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-chronolog_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chronolog_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chronolog-network

networks:
  chronolog-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
